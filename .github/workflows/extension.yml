name: extension

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Package Chromium release zip
        run: |
          PACKAGE_DIR="release/irefined-browser-chromium-build-${{ github.run_number }}"
          mkdir -p "$PACKAGE_DIR"
          cp -R extension/dist/. "$PACKAGE_DIR/"
          cd release
          zip -r "irefined-browser-chromium-build-${{ github.run_number }}.zip" "irefined-browser-chromium-build-${{ github.run_number }}"

      - name: Upload release-style artifact
        uses: actions/upload-artifact@v4
        with:
          name: irefined-browser-chromium-build-${{ github.run_number }}
          path: release/irefined-browser-chromium-build-${{ github.run_number }}.zip
