name: release-package

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Package Chromium release zip
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          PACKAGE_DIR="release/irefined-browser-chromium-$VERSION"
          mkdir -p "$PACKAGE_DIR"
          cp -R extension/dist/. "$PACKAGE_DIR/"
          cd release
          zip -r "irefined-browser-chromium-$VERSION.zip" "irefined-browser-chromium-$VERSION"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: irefined-browser-chromium-${{ github.event.release.tag_name }}
          path: release/irefined-browser-chromium-${{ github.event.release.tag_name }}.zip

      - name: Attach asset to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "release/irefined-browser-chromium-${{ github.event.release.tag_name }}.zip" --clobber
