name: wiki-sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/wiki/**
      - .github/workflows/wiki-sync.yml

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish GitHub wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/wiki
          strategy: init
          disable-empty-commits: true
          commit-message: Sync wiki from repository docs
